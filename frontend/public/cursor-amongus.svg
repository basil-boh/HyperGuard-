<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Among Us crewmate cursor (hand-drawn). Dark outline keeps it visible on light + dark themes. -->
  <g stroke="#3A0A0A" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round">
    <!-- backpack -->
    <rect x="5" y="13" width="6" height="10" rx="2.6" fill="#A20F0F"/>
    <!-- body -->
    <path d="M10,12 C10,6 13,4 17,4 C21,4 25,7 25,12 L25,30 L18.5,30 L18.5,26 L14.5,26 L14.5,30 L10,30 Z" fill="#C51111"/>
  </g>
  <!-- visor -->
  <ellipse cx="19" cy="12" rx="6" ry="3.3" fill="#B5E8F7" stroke="#7FB9CC" stroke-width="1.1"/>
  <ellipse cx="21.3" cy="10.9" rx="1.5" ry="0.95" fill="#FFFFFF" fill-opacity="0.85"/>
</svg>
